services:
  web:
    build: .
    container_name: pctoxp_web
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db
    # environment:
    #   MYSQL_HOST: db
    #   MYSQL_USER: root
    #   MYSQL_PASSWORD: root
    #   MYSQL_DATABASE: pctoxp_db

  db:
    image: mysql:8.0
    container_name: pctoxp_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: pctoxp_db
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - "33061:3306"
    volumes:
      - db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: pctoxp_phpmyadmin
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root

volumes:
  db_data:
